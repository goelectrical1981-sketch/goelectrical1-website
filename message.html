<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Us a Message - GO Electrical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#0F52BA', secondary: '#FF6B00', dark: '#1E293B' } } } }
    </script>
</head>
<body class="font-sans text-gray-700 bg-gray-50">
    <!-- Navigation -->
    <nav class="fixed w-full bg-white/95 backdrop-blur-sm shadow-md z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-primary text-2xl"><i class="fa fa-bolt"></i></span>
                <h1 class="text-xl font-bold text-primary">GO Electrical Engineering</h1>
            </div>
            <div class="hidden md:flex gap-8">
                <a href="index.html" class="font-medium hover:text-primary transition-colors">Home</a>
                <a href="services.html" class="font-medium hover:text-primary transition-colors">Services</a>
                <a href="about.html" class="font-medium hover:text-primary transition-colors">About</a>
                <a href="contact.html" class="font-medium hover:text-primary transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Send Us Message Form Page -->
    <section class="py-32 bg-gray-50">
        <div class="container mx-auto px-4">
            <div class="text-center mb-16">
                <h2 class="text-[clamp(1.8rem,3vw,2.5rem)] font-bold text-dark">Send Us a Message</h2>
                <p class="mt-3 text-gray-600 max-w-2xl mx-auto">Have a project or inquiry? Fill out the form below and we will get back to you as soon as possible.</p>
            </div>
            <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl p-8">
                <form action="https://formspree.io/f/your-form-id" method="POST" class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">Full Name</label>
                        <input type="text" name="name" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">Email Address</label>
                        <input type="email" name="_replyto" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">Phone Number</label>
                        <input type="tel" name="phone" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">Service Needed</label>
                        <select name="service" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
                            <option value="">Select a service</option>
                            <option value="Design & Planning">Electrical Design & Planning</option>
                            <option value="Installation & Construction">Installation & Construction</option>
                            <option value="Maintenance & Safety">Maintenance & Safety Inspection</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-gray-700 font-medium mb-2">Message / Details of Project</label>
                        <textarea name="message" rows="5" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Tell us about your project, location, and requirements..."></textarea>
                    </div>
                    <div class="md:col-span-2">
                        <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-6 rounded-lg transition-all shadow-md hover:shadow-lg">SEND MESSAGE</button>
                    </div>
                    <input type="hidden" name="_next" value="https://goelectrical1981.github.io/goelectrical1-website/salamat.html">
                    <input type="hidden" name="_timezone" value="Asia/Manila">
                </form>
            </div>
        </div>
    </section>
</body>
</html>
