<!-- ✅ NETLIFY FORM - SIGURADONG GAGANA AGAD -->
<form 
  name="contact-us" 
  method="POST" 
  data-netlify="true" 
  action="/salamat.html"
  class="bg-white/90 backdrop-blur-sm p-10 rounded-2xl shadow-xl text-left"
>
  <!-- Kinakailangan ito para makilala ng Netlify ang form -->
  <input type="hidden" name="form-name" value="contact-us">

  <div class="grid md:grid-cols-2 gap-6 mb-6">
    <div>
      <label class="block text-gray-700 font-medium mb-2">Your Name</label>
      <input type="text" name="name" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
    </div>
    <div>
      <label class="block text-gray-700 font-medium mb-2">Email Address</label>
      <input type="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
    </div>
  </div>

  <div class="grid md:grid-cols-2 gap-6 mb-6">
    <div>
      <label class="block text-gray-700 font-medium mb-2">Phone Number</label>
      <input type="tel" name="phone" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
    </div>
    <div>
      <label class="block text-gray-700 font-medium mb-2">Service Needed</label>
      <select name="service" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
        <option value="">Select a Service</option>
        <option value="Design & Planning">Electrical Design & Planning</option>
        <option value="Installation & Construction">Installation & Constructions</option>
        <option value="Maintenance & Inspection">Maintenance & Safety Inspections</option>
      </select>
    </div>
  </div>

  <div class="mb-6">
    <label class="block text-gray-700 font-medium mb-2">Message / Details of Project</label>
    <textarea name="message" rows="5" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Tell us about your project, location, and requirements..."></textarea>
  </div>

  <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-6 rounded-lg transition-all shadow-lg hover:shadow-xl">SEND MESSAGE</button>
</form>
