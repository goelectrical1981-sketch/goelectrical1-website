<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - GO Electrical Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F52BA',
                        secondary: '#FF6B00',
                        dark: '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-gray-50 text-gray-700 flex items-center justify-center min-h-screen">
    <div class="text-center p-8 bg-white rounded-2xl shadow-xl max-w-lg mx-auto">
        <div class="text-primary text-6xl mb-4">
            <i class="fa fa-check-circle"></i>
        </div>
        <h1 class="text-[clamp(1.8rem,3vw,2.5rem)] font-bold text-dark mb-2">Thank You!</h1>
        <p class="text-gray-600 mb-6">Your message has been sent successfully. We will get back to you as soon as possible.</p>
        <p class="text-gray-500 text-sm mb-4">
            Submitted at: <span id="ph-time"></span>
        </p>
        <script>
        const now = new Date();
        const options = {
            timeZone: 'Asia/Manila',
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            hour12: true
        };
        document.getElementById('ph-time').textContent = now.toLocaleString('en-US', options);
        </script>
        <a href="index.html" class="bg-primary hover:bg-primary/90 text-white px-8 py-3 rounded-lg font-semibold transition-all shadow-md hover:shadow-lg inline-block">
            Back to Home
        </a>
    </div>
</body>
</html>
